<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Method</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #020617;
    color: #e5e7eb;
}

header {
    padding: 20px;
    border-bottom: 1px solid #1f2933;
}

header a {
    color: #38bdf8;
    text-decoration: none;
    font-weight: bold;
}

main {
    max-width: 800px;
    margin: auto;
    padding: 40px;
}

h1 {
    color: #38bdf8;
}

p {
    color: #9ca3af;
    line-height: 1.6;
}

.section {
    background: #111827;
    border: 1px solid #1f2933;
    border-radius: 12px;
    padding: 20px;
    margin-top: 25px;
}
</style>
</head>

<body>

<header>
    <a href="index.html">← Back</a>
</header>

<main>
    <h1 id="title"></h1>
    <p id="description"></p>

    <div class="section">
        <h2>Required Items</h2>
        <ul id="items"></ul>
    </div>
</main>

<script>
const data = {
    example: {
        title: "Example Method",
        description: "This is a reusable template example.",
        items: ["Item One", "Item Two", "Item Three"]
    },

    method1: {
        title: "Method One",
        description: "Browser-based template content.",
        items: ["Browser", "Extension", "Test Page"]
    },

    method2: {
        title: "Method Two",
        description: "Network-style template content.",
        items: ["Network Tool", "Access Point"]
    }
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (data[id]) {
    document.getElementById("title").textContent = data[id].title;
    document.getElementById("description").textContent = data[id].description;

    const list = document.getElementById("items");
    data[id].items.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
    });
} else {
    document.getElementById("title").textContent = "Not Found";
    document.getElementById("description").textContent = "This entry does not exist.";
}
</script>

</body>
</html>
