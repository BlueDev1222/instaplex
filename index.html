<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Market</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --accent: #38bdf8;
    --warn: #facc15;
    --text: #e5e7eb;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

h1, h2 {
    text-align: center;
    color: var(--accent);
}

.controls, .ai-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

input, button {
    padding: 10px;
    border-radius: 6px;
    border: none;
}

input {
    flex: 1;
    background: var(--card);
    color: white;
}

button {
    background: var(--accent);
    font-weight: bold;
    cursor: pointer;
}

.watchlist .item {
    background: var(--card);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
}

.timeframes {
    display: flex;
    gap: 6px;
    margin: 10px 0;
}

.timeframes button {
    background: var(--card);
    color: white;
}

.timeframes button.active {
    background: var(--accent);
    color: black;
}

canvas {
    border-radius: 10px;
}

#tv {
    height: 420px;
    margin-top: 15px;
}

/* ===== AI SECTION ===== */
.ai-section {
    margin-top: 40px;
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
}

.warning {
    background: rgba(250,204,21,0.1);
    border: 1px solid var(--warn);
    color: var(--warn);
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 10px;
}

.ai-status {
    font-size: 13px;
    color: #94a3b8;
    height: 18px;
    margin-bottom: 6px;
}

.ai-status.active::after {
    content: " ▓▒░";
    animation: dots 1.2s infinite;
}

@keyframes dots {
    0% { content: " ░"; }
    50% { content: " ▓▒"; }
    100% { content: " ▓▒░"; }
}

#aiCanvas {
    width: 100%;
    height: 360px;
    background: radial-gradient(circle at top, #020617, #000);
}

.footer {
    text-align: center;
    margin-top: 25px;
    font-size: 13px;
    color: #94a3b8;
}
</style>
</head>

<body>
<div class="container">
<h1>🌌 Nebula Market</h1>

<div class="controls">
    <input id="symbol" placeholder="AAPL, TSLA, BTC">
    <button onclick="add()">Add</button>
</div>

<div class="watchlist" id="watchlist"></div>

<div class="timeframes">
    <button onclick="loadHistory('1D')" class="active">1D</button>
    <button onclick="loadHistory('1W')">1W</button>
    <button onclick="loadHistory('1M')">1M</button>
</div>

<canvas id="chart" height="120"></canvas>
<div id="tv"></div>

<!-- AI SECTION -->
<div class="ai-section">
    <h2>🤖 AI Trajectory Projector</h2>

    <div class="warning">
        ⚠️ AI-generated projection. Results may be inaccurate or misleading.
        Visualization only.
    </div>

    <div class="ai-status" id="aiStatus">Idle</div>

    <div class="ai-controls">
        <button onclick="runAI()">Recalculate</button>
        <button onclick="clearAI()">Clear</button>
    </div>

    <canvas id="aiCanvas"></canvas>
</div>

<div class="footer">
    © <span id="year"></span> Nebula Market. All rights reserved.
</div>
</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* ===== MARKET ===== */
let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];
let selected = null;
let chart;

function add() {
    const s = symbol.value.toUpperCase();
    if (!s || watchlist.includes(s)) return;
    watchlist.push(s);
    localStorage.setItem("watchlist", JSON.stringify(watchlist));
    render();
}

function render() {
    watchlistEl.innerHTML = "";
    watchlist.forEach(s => {
        const d = document.createElement("div");
        d.className = "item";
        d.textContent = s;
        d.onclick = () => selectSymbol(s);
        watchlistEl.appendChild(d);
    });
}
const watchlistEl = document.getElementById("watchlist");
render();

function selectSymbol(s) {
    selected = s;
    loadTradingView(s);
    runAI(); // 🔗 SYNC TO AI
}

function loadHistory(tf) {
    document.querySelectorAll(".timeframes button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");

    const labels = Array.from({length: 20}, (_, i) => i);
    const prices = labels.map(() => Math.random() * 5 + 100);

    if (chart) chart.destroy();
    chart = new Chart(chartEl, {
        type: "line",
        data: { labels, datasets: [{ label: selected, data: prices, tension: 0.4 }] }
    });
}

function loadTradingView(symbol) {
    tv.innerHTML = "";
    new TradingView.widget({
        container_id: "tv",
        symbol: ["BTC","ETH","SOL","DOGE"].includes(symbol)
            ? `BINANCE:${symbol}USDT`
            : symbol,
        theme: "dark",
        autosize: true
    });
}

const chartEl = document.getElementById("chart");
const tv = document.getElementById("tv");

/* ===== AI TRAJECTORY ===== */
const aiCanvas = document.getElementById("aiCanvas");
const ctx = aiCanvas.getContext("2d");
const aiStatus = document.getElementById("aiStatus");

function resizeAI() {
    aiCanvas.width = aiCanvas.offsetWidth;
    aiCanvas.height = aiCanvas.offsetHeight;
}
window.addEventListener("resize", resizeAI);
resizeAI();

function clearAI() {
    ctx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
    aiStatus.textContent = "Idle";
    aiStatus.classList.remove("active");
}

function runAI() {
    aiStatus.textContent = `AI recalculating trajectory for ${selected || "asset"}…`;
    aiStatus.classList.add("active");
    clearAI();

    setTimeout(() => {
        aiStatus.classList.remove("active");
        drawTrajectory();
        aiStatus.textContent = `Trajectory projected (${selected || "unknown"})`;
    }, 1200);
}

function drawTrajectory() {
    let seed = selected ? selected.charCodeAt(0) : 65;
    let x = aiCanvas.width * 0.15;
    let y = aiCanvas.height * 0.75;

    ctx.lineWidth = 2;

    ctx.strokeStyle = "rgba(56,189,248,0.15)";
    for (let i = 0; i < 6; i++) path(x, y, seed, true);

    ctx.strokeStyle = "#38bdf8";
    path(x, y, seed, false);
}

function path(x, y, seed, noise) {
    ctx.beginPath();
    ctx.moveTo(x, y);

    let vx = 5 + seed % 3;
    let vy = -7 - seed % 4;
    let g = 0.35;

    for (let i = 0; i < 60; i++) {
        if (noise) {
            vx += (Math.random() - 0.5) * 0.4;
            vy += (Math.random() - 0.5) * 0.4;
        }
        x += vx;
        y += vy;
        vy += g;
        ctx.lineTo(x, y);
    }
    ctx.stroke();
}
</script>
</body>
</html>
