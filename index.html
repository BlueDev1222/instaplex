<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Market Tracker</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: #020617;
        padding: 25px;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 0 30px rgba(0,255,255,0.1);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        color: #38bdf8;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: none;
        outline: none;
        margin-bottom: 10px;
        background: #0f172a;
        color: white;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #38bdf8;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #0ea5e9;
    }

    .result {
        margin-top: 15px;
        background: #020617;
        padding: 12px;
        border-radius: 8px;
        display: none;
    }

    .up { color: #22c55e; }
    .down { color: #ef4444; }
</style>
</head>
<body>

<div class="container">
    <h1>📊 Market Tracker</h1>

    <input id="symbol" placeholder="Enter stock symbol (AAPL)">
    <button onclick="getStock()">Track Stock</button>

    <div class="result" id="result"></div>
</div>

<script>
const API_KEY = "3UF0NYK6IEGTIA3Z";

async function getStock() {
    const symbol = document.getElementById("symbol").value.toUpperCase();
    const result = document.getElementById("result");

    if (!symbol) return alert("Enter a stock symbol!");

    result.style.display = "block";
    result.innerHTML = "Loading...";

    try {
        const res = await fetch(
            `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`
        );
        const data = await res.json();

        const stock = data["Global Quote"];

        if (!stock || !stock["05. price"]) {
            result.innerHTML = "Stock not found.";
            return;
        }

        const price = parseFloat(stock["05. price"]).toFixed(2);
        const change = parseFloat(stock["09. change"]).toFixed(2);
        const percent = stock["10. change percent"];

        const trend = change >= 0 ? "up" : "down";

        result.innerHTML = `
            <strong>${symbol}</strong><br>
            Price: $${price}<br>
            Change: <span class="${trend}">${change} (${percent})</span>
        `;
    } catch (e) {
        result.innerHTML = "Error fetching data.";
    }
}
</script>

</body>
</html>
