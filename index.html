<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Tracker Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --accent: #38bdf8;
    --text: #e5e7eb;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

h1 {
    text-align: center;
    color: var(--accent);
}

.controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

.controls input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: var(--card);
    color: white;
}

.controls button {
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    font-weight: bold;
}

.watchlist {
    margin-top: 10px;
}

.item {
    background: var(--card);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

.timeframes {
    display: flex;
    gap: 6px;
    margin: 10px 0;
}

.timeframes button {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    border: none;
    background: var(--card);
    color: white;
}

.timeframes button.active {
    background: var(--accent);
    color: black;
}

canvas {
    background: var(--bg);
    border-radius: 10px;
}

#tv {
    height: 420px;
    margin-top: 15px;
}

/* 📱 Mobile tweaks */
@media (max-width: 600px) {
    #tv { height: 360px; }
}
</style>
</head>

<body>
<div class="container">
    <h1>📊 Market Tracker Pro</h1>

    <div class="controls">
        <input id="symbol" placeholder="AAPL, TSLA, BTC">
        <button onclick="add()">Add</button>
    </div>

    <div class="watchlist" id="watchlist"></div>

    <div class="timeframes">
        <button onclick="loadHistory('1D')" class="active">1D</button>
        <button onclick="loadHistory('1W')">1W</button>
        <button onclick="loadHistory('1M')">1M</button>
    </div>

    <canvas id="chart" height="120"></canvas>

    <div id="tv"></div>
</div>

<script>
const API_KEY = "3UF0NYK6IEGTIA3Z";
let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];
let selected = null;
let chart;

function save() {
    localStorage.setItem("watchlist", JSON.stringify(watchlist));
}

function isCrypto(s) {
    return ["BTC","ETH","SOL","DOGE"].includes(s);
}

function add() {
    const s = document.getElementById("symbol").value.toUpperCase();
    if (!s || watchlist.includes(s)) return;
    watchlist.push(s);
    save();
    render();
}

function render() {
    const w = document.getElementById("watchlist");
    w.innerHTML = "";
    watchlist.forEach(s => {
        const d = document.createElement("div");
        d.className = "item";
        d.innerHTML = `<strong>${s}</strong>`;
        d.onclick = () => selectSymbol(s);
        w.appendChild(d);
    });
}
render();

function selectSymbol(s) {
    selected = s;
    loadHistory("1D");
    loadTradingView(s);
}

async function loadHistory(tf) {
    document.querySelectorAll(".timeframes button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");

    let points = tf === "1D" ? 24 : tf === "1W" ? 7 : 30;
    let labels = [];
    let prices = [];

    for (let i = points; i > 0; i--) {
        labels.push(i);
        prices.push(Math.random() * 5 + 100); // demo smoothing
    }

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: selected,
                data: prices,
                borderWidth: 2,
                tension: 0.4
            }]
        },
        options: {
            plugins: { legend: { labels: { color: "#e5e7eb" }}},
            scales: {
                x: { ticks: { color: "#94a3b8" }},
                y: { ticks: { color: "#94a3b8" }}
            }
        }
    });
}

function loadTradingView(symbol) {
    document.getElementById("tv").innerHTML = "";
    new TradingView.widget({
        container_id: "tv",
        symbol: isCrypto(symbol) ? `BINANCE:${symbol}USDT` : symbol,
        interval: "30",
        theme: "dark",
        style: "1",
        locale: "en",
        autosize: true,
        hide_side_toolbar: false
    });
}
</script>
</body>
</html>
