<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Bypass</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #020617;
    color: #e5e7eb;
}

/* HEADER */
header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px;
    border-bottom: 1px solid #1f2933;
}

.logo {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: #38bdf8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #020617;
}

.site-title {
    font-size: 22px;
    font-weight: bold;
    color: #38bdf8;
}

/* CONTROLS */
.controls {
    padding: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.search {
    flex: 1;
    min-width: 220px;
}

.search input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid #1f2933;
    background: #111827;
    color: #e5e7eb;
}

.categories button {
    padding: 8px 14px;
    background: #111827;
    border: 1px solid #1f2933;
    border-radius: 6px;
    color: #e5e7eb;
    cursor: pointer;
}

.categories button.active,
.categories button:hover {
    background: #38bdf8;
    color: #020617;
}

/* CARDS */
main {
    padding: 20px 40px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

.card {
    background: #111827;
    border: 1px solid #1f2933;
    border-radius: 12px;
    padding: 20px;
}

.card h2 {
    margin-top: 0;
    color: #38bdf8;
}

.card p {
    color: #9ca3af;
    font-size: 14px;
}

.card a {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 16px;
    background: #38bdf8;
    color: #020617;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
}

.card a:hover {
    background: #0ea5e9;
}

footer {
    text-align: center;
    padding: 15px;
    border-top: 1px solid #1f2933;
    color: #9ca3af;
    font-size: 13px;
}
</style>
</head>

<body>

<header>
    <div class="logo">SB</div>
    <div class="site-title">School Bypass</div>
</header>

<div class="controls">
    <div class="search">
        <input type="text" id="searchInput" placeholder="Search...">
    </div>

    <div class="categories">
        <button class="active" data-category="all">All</button>
        <button data-category="browser">Browser</button>
        <button data-category="network">Network</button>
        <button data-category="tools">Tools</button>
    </div>
</div>

<main id="cards">

    <!-- ADD MORE CARDS -->
    <div class="card" data-title="MathAI" data-category="tools">
        <h2>Math AI Unblocked</h2>
        <p>This is a math AI that is not blocked.</p>
        <a href="template.html?id=MathAI">Open</a>
    </div>

    <div class="card" data-title="CompTIABot" data-category="browser">
        <h2>CompTIA Bot</h2>
        <p>This is a CompTIA bot i made so it will do it for you.</p>
        <a href="template.html?id=CompTIABot">Open</a>
    </div>

    <div class="card" data-title="Method Two" data-category="network">
        <h2>Goguardian Bypass</h2>
        <p>This will bypass Goguardian but this gets patched alot.</p>
        <a href="template.html?id=Goguardian">Open</a>
    </div>

</main>

<footer>
 © 2026 School Bypass • All Rights Reserved
</footer>

<script>
const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");
const categoryButtons = document.querySelectorAll(".categories button");

let activeCategory = "all";

searchInput.addEventListener("input", filterCards);

categoryButtons.forEach(btn => {
    btn.addEventListener("click", () => {
        categoryButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeCategory = btn.dataset.category;
        filterCards();
    });
});

function filterCards() {
    const search = searchInput.value.toLowerCase();

    cards.forEach(card => {
        const title = card.dataset.title.toLowerCase();
        const category = card.dataset.category;

        const matchesSearch = title.includes(search);
        const matchesCategory = activeCategory === "all" || category === activeCategory;

        card.style.display = (matchesSearch && matchesCategory) ? "block" : "none";
    });
}
</script>

</body>
</html>
