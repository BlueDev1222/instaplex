<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Market</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --accent: #38bdf8;
    --text: #e5e7eb;
    --muted: #94a3b8;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    background: radial-gradient(circle at top, #020617, #000);
    color: var(--text);
    font-family: Inter, Arial, sans-serif;
}

.container {
    max-width: 980px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    color: var(--accent);
    margin-bottom: 20px;
    letter-spacing: 1px;
}

/* Controls */
.controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #1e293b;
    background: var(--card);
    color: white;
    font-size: 15px;
}

button {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: #020617;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
}

button:hover {
    transform: translateY(-1px);
    opacity: 0.9;
}

/* Watchlist */
.watchlist {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
    margin-bottom: 15px;
}

.watchlist .item {
    background: var(--card);
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s ease;
}

.watchlist .item:hover {
    border-color: var(--accent);
    color: var(--accent);
}

/* Timeframes */
.timeframes {
    display: flex;
    gap: 8px;
    margin: 15px 0;
}

.timeframes button {
    flex: 1;
    background: var(--card);
    color: var(--text);
    border: 1px solid #1e293b;
}

.timeframes button.active {
    background: var(--accent);
    color: #020617;
}

/* Charts */
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 20px;
    box-shadow: 0 0 0 1px #020617, 0 20px 40px rgba(0,0,0,0.4);
}

canvas {
    border-radius: 12px;
}

#tv {
    height: 420px;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 30px;
    font-size: 13px;
    color: var(--muted);
}

@media (max-width: 600px) {
    #tv { height: 340px; }
}
</style>
</head>

<body>
<div class="container">
    <h1>🌌 Nebula Market</h1>

    <div class="controls">
        <input id="symbol" placeholder="AAPL, TSLA, BTC">
        <button onclick="add()">Add</button>
    </div>

    <div class="watchlist" id="watchlist"></div>

    <div class="timeframes">
        <button onclick="loadHistory('1D')" class="active">1D</button>
        <button onclick="loadHistory('1W')">1W</button>
        <button onclick="loadHistory('1M')">1M</button>
    </div>

    <div class="card">
        <canvas id="chart" height="120"></canvas>
    </div>

    <div class="card">
        <div id="tv"></div>
    </div>

    <div class="footer">
        © <span id="year"></span> Nebula Market. All rights reserved.
    </div>
</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* ===== MARKET ===== */
let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];
let selected = null;
let chart;

function add() {
    const s = symbol.value.toUpperCase().trim();
    if (!s || watchlist.includes(s)) return;
    watchlist.push(s);
    localStorage.setItem("watchlist", JSON.stringify(watchlist));
    render();
}

const watchlistEl = document.getElementById("watchlist");
function render() {
    watchlistEl.innerHTML = "";
    watchlist.forEach(s => {
        const d = document.createElement("div");
        d.className = "item";
        d.textContent = s;
        d.onclick = () => selectSymbol(s);
        watchlistEl.appendChild(d);
    });
}
render();

function selectSymbol(s) {
    selected = s;
    loadTradingView(s);
}

function loadHistory(tf) {
    document.querySelectorAll(".timeframes button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");

    const labels = Array.from({length: 30}, (_, i) => i);
    const prices = labels.map(() => Math.random() * 5 + 100);

    if (chart) chart.destroy();
    chart = new Chart(chartEl, {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: selected || "Market",
                data: prices,
                borderColor: "#38bdf8",
                tension: 0.4
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                x: { display: false },
                y: { ticks: { color: "#94a3b8" } }
            }
        }
    });
}

function loadTradingView(symbol) {
    tv.innerHTML = "";
    new TradingView.widget({
        container_id: "tv",
        symbol: ["BTC","ETH","SOL","DOGE"].includes(symbol)
            ? `BINANCE:${symbol}USDT`
            : symbol,
        theme: "dark",
        autosize: true
    });
}

const chartEl = document.getElementById("chart");
const tv = document.getElementById("tv");
</script>
</body>
</html>
