<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Market Tracker Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #020617;
    color: #e5e7eb;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #38bdf8;
}

.controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

input, button {
    padding: 10px;
    border-radius: 6px;
    border: none;
}

input {
    flex: 1;
    background: #0f172a;
    color: white;
}

button {
    background: #38bdf8;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

.watchlist {
    margin-top: 20px;
}

.item {
    background: #0f172a;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
}

.up { color: #22c55e; }
.down { color: #ef4444; }

canvas {
    background: #020617;
    margin-top: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>
<div class="container">
    <h1>📈 Market Tracker Pro</h1>

    <div class="controls">
        <input id="symbol" placeholder="AAPL, TSLA, BTC, ETH">
        <button onclick="addToWatchlist()">Add</button>
    </div>

    <div class="watchlist" id="watchlist"></div>

    <canvas id="chart" height="120"></canvas>
</div>

<script>
const API_KEY = "3UF0NYK6IEGTIA3Z";
const watchlist = [];
let chart;

function isCrypto(symbol) {
    return ["BTC","ETH","SOL","DOGE"].includes(symbol);
}

async function fetchStock(symbol) {
    const res = await fetch(
        `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`
    );
    const data = await res.json();
    return parseFloat(data["Global Quote"]["05. price"]);
}

async function fetchCrypto(symbol) {
    const idMap = { BTC: "bitcoin", ETH: "ethereum", SOL: "solana", DOGE: "dogecoin" };
    const res = await fetch(
        `https://api.coingecko.com/api/v3/simple/price?ids=${idMap[symbol]}&vs_currencies=usd`
    );
    const data = await res.json();
    return data[idMap[symbol]].usd;
}

async function addToWatchlist() {
    const symbol = document.getElementById("symbol").value.toUpperCase();
    if (!symbol || watchlist.includes(symbol)) return;

    watchlist.push(symbol);
    document.getElementById("symbol").value = "";
    updateWatchlist();
}

async function updateWatchlist() {
    const container = document.getElementById("watchlist");
    container.innerHTML = "";

    for (let symbol of watchlist) {
        let price = isCrypto(symbol)
            ? await fetchCrypto(symbol)
            : await fetchStock(symbol);

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `<strong>${symbol}</strong><span>$${price.toFixed(2)}</span>`;
        div.onclick = () => loadChart(symbol);
        container.appendChild(div);
    }
}

async function loadChart(symbol) {
    let prices = [];
    let labels = [];

    for (let i = 10; i >= 0; i--) {
        prices.push(Math.random() * 5 + 95);
        labels.push(`${i}m`);
    }

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: symbol,
                data: prices,
                borderWidth: 2,
                tension: 0.4
            }]
        },
        options: {
            plugins: { legend: { labels: { color: "#e5e7eb" }}},
            scales: {
                x: { ticks: { color: "#94a3b8" }},
                y: { ticks: { color: "#94a3b8" }}
            }
        }
    });
}

// 🔄 Live Auto Refresh (every 30s)
setInterval(updateWatchlist, 30000);
</script>
</body>
</html>
