<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Market</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --accent: #38bdf8;
    --warn: #facc15;
    --text: #e5e7eb;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

h1, h2 {
    text-align: center;
    color: var(--accent);
}

.controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

.controls input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: var(--card);
    color: white;
}

.controls button,
button {
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    font-weight: bold;
    cursor: pointer;
}

.watchlist {
    margin-top: 10px;
}

.item {
    background: var(--card);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
}

.timeframes {
    display: flex;
    gap: 6px;
    margin: 10px 0;
}

.timeframes button {
    flex: 1;
    background: var(--card);
    color: white;
}

.timeframes button.active {
    background: var(--accent);
    color: black;
}

canvas {
    background: var(--bg);
    border-radius: 10px;
}

#tv {
    height: 420px;
    margin-top: 15px;
}

/* ===== AI SECTION ===== */

.ai-section {
    margin-top: 40px;
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
}

.warning {
    background: rgba(250, 204, 21, 0.1);
    border: 1px solid var(--warn);
    color: var(--warn);
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 10px;
}

.ai-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

#aiCanvas {
    width: 100%;
    height: 380px;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 25px;
    font-size: 13px;
    color: #94a3b8;
}

@media (max-width: 600px) {
    #tv { height: 360px; }
}
</style>
</head>

<body>
<div class="container">
    <h1>🌌 Nebula Market</h1>

    <!-- Market Controls -->
    <div class="controls">
        <input id="symbol" placeholder="AAPL, TSLA, BTC">
        <button onclick="add()">Add</button>
    </div>

    <div class="watchlist" id="watchlist"></div>

    <div class="timeframes">
        <button onclick="loadHistory('1D')" class="active">1D</button>
        <button onclick="loadHistory('1W')">1W</button>
        <button onclick="loadHistory('1M')">1M</button>
    </div>

    <canvas id="chart" height="120"></canvas>
    <div id="tv"></div>

    <!-- ===== AI TRAJECTORY PROJECTOR ===== -->
    <div class="ai-section">
        <h2>🤖 AI Trajectory Projector</h2>

        <div class="warning">
            ⚠️ AI-generated projection. Results may be inaccurate, incomplete,
            or misleading. For visualization only.
        </div>

        <div class="ai-controls">
            <button onclick="project()">Project Trajectory</button>
            <button onclick="clearAI()">Clear</button>
        </div>

        <canvas id="aiCanvas"></canvas>
    </div>

    <div class="footer">
        © <span id="year"></span> Nebula Market. All rights reserved.
    </div>
</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* ===== MARKET LOGIC ===== */
let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];
let selected = null;
let chart;

function save() {
    localStorage.setItem("watchlist", JSON.stringify(watchlist));
}

function isCrypto(s) {
    return ["BTC","ETH","SOL","DOGE"].includes(s);
}

function add() {
    const s = document.getElementById("symbol").value.toUpperCase();
    if (!s || watchlist.includes(s)) return;
    watchlist.push(s);
    save();
    render();
}

function render() {
    const w = document.getElementById("watchlist");
    w.innerHTML = "";
    watchlist.forEach(s => {
        const d = document.createElement("div");
        d.className = "item";
        d.textContent = s;
        d.onclick = () => selectSymbol(s);
        w.appendChild(d);
    });
}
render();

function selectSymbol(s) {
    selected = s;
    loadHistory("1D");
    loadTradingView(s);
}

function loadHistory(tf) {
    document.querySelectorAll(".timeframes button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");

    let points = tf === "1D" ? 24 : tf === "1W" ? 7 : 30;
    let labels = [], prices = [];

    for (let i = points; i > 0; i--) {
        labels.push(i);
        prices.push(Math.random() * 5 + 100);
    }

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: { labels, datasets: [{ label: selected, data: prices, tension: 0.4 }] }
    });
}

function loadTradingView(symbol) {
    document.getElementById("tv").innerHTML = "";
    new TradingView.widget({
        container_id: "tv",
        symbol: isCrypto(symbol) ? `BINANCE:${symbol}USDT` : symbol,
        interval: "30",
        theme: "dark",
        autosize: true
    });
}

/* ===== AI TRAJECTORY ===== */
const aiCanvas = document.getElementById("aiCanvas");
const ctx = aiCanvas.getContext("2d");

function resizeAI() {
    aiCanvas.width = aiCanvas.offsetWidth;
    aiCanvas.height = aiCanvas.offsetHeight;
}
window.addEventListener("resize", resizeAI);
resizeAI();

function clearAI() {
    ctx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
}

function project() {
    clearAI();

    const sx = aiCanvas.width * 0.15;
    const sy = aiCanvas.height * 0.75;

    ctx.lineWidth = 2;

    ctx.strokeStyle = "rgba(56,189,248,0.15)";
    for (let i = 0; i < 7; i++) drawPath(sx, sy, true);

    ctx.strokeStyle = "#38bdf8";
    drawPath(sx, sy, false);
}

function drawPath(x, y, noise) {
    ctx.beginPath();
    ctx.moveTo(x, y);

    let vx = 6, vy = -8, g = 0.35;

    for (let i = 0; i < 60; i++) {
        if (noise) {
            vx += (Math.random() - 0.5) * 0.4;
            vy += (Math.random() - 0.5) * 0.4;
        }
        x += vx;
        y += vy;
        vy += g;
        ctx.lineTo(x, y);
    }
    ctx.stroke();
}
</script>
</body>
</html>
