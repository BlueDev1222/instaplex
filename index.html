<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeMines Mega v2</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{margin:0;background:linear-gradient(135deg,#0f172a,#020617);color:white;text-align:center;transition:0.4s ease;overflow-x:hidden;}
body.hot{box-shadow:inset 0 0 120px rgba(255,215,0,0.25);background:linear-gradient(135deg,#1e293b,#000);}
header{padding:25px;font-size:42px;font-weight:700;}
.logo{background:linear-gradient(90deg,#38bdf8,#818cf8,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:shine 6s linear infinite;}
@keyframes shine{to{background-position:200% center;}}
.container{padding:20px;}
.panel{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-radius:16px;padding:20px;max-width:520px;margin:auto;box-shadow:0 0 25px rgba(56,189,248,0.15);transition:0.4s;}
body.hot .panel{box-shadow:0 0 35px rgba(255,215,0,0.5);border-color:rgba(255,215,0,0.4);}
.balance{font-size:18px;margin-bottom:10px;color:#22d3ee;}
.shop-btn{margin-left:10px;padding:6px 10px;border-radius:8px;border:none;cursor:pointer;font-weight:600;background:linear-gradient(90deg,#facc15,#f97316);color:black;}
.controls{margin-bottom:15px;}
input,select{padding:10px;border-radius:8px;border:none;margin:5px;font-size:15px;width:90px;text-align:center;}
button{padding:10px 16px;border-radius:10px;border:none;font-weight:600;cursor:pointer;margin:5px;transition:0.2s ease;}
.primary{background:linear-gradient(90deg,#38bdf8,#818cf8);color:black;}
.secondary{background:#1e293b;color:white;border:1px solid #334155;}
.stats{margin:15px 0;font-size:18px;}
.stats span{font-weight:600;color:#38bdf8;}
.grid{display:grid;grid-template-columns:repeat(5,70px);gap:12px;justify-content:center;margin-top:15px;}
.tile{width:70px;height:70px;background:linear-gradient(145deg,#1e293b,#0f172a);border-radius:14px;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s ease;}
.tile:hover{transform:scale(1.08);}
.revealed.safe{background:linear-gradient(145deg,#22c55e,#16a34a);box-shadow:0 0 15px rgba(34,197,94,0.8);animation:pop 0.2s ease;}
.revealed.mine{background:linear-gradient(145deg,#ef4444,#b91c1c);box-shadow:0 0 18px rgba(239,68,68,0.9);animation:shake 0.3s ease;}
.revealed.gold{background:linear-gradient(145deg,#facc15,#eab308);box-shadow:0 0 20px rgba(250,204,21,0.9);animation:pop 0.3s ease;}
.revealed.purple{background:linear-gradient(145deg,#a855f7,#9333ea);box-shadow:0 0 20px rgba(168,85,247,0.9);animation:pop 0.3s ease;}
.revealed.rainbow{background:linear-gradient(90deg,red,orange,yellow,green,blue,purple);box-shadow:0 0 22px rgba(255,255,255,0.9);animation:pop 0.3s ease;}
.revealed.diamond{background:linear-gradient(135deg,#0ff,#4dd);box-shadow:0 0 30px #0ff,0 0 60px #4dd;animation:pop 0.5s ease;font-size:28px;}
@keyframes pop{0%{transform:scale(0.6);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);} }
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
.shop{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;}
.shop-content{background:#0f172a;padding:25px;border-radius:16px;box-shadow:0 0 25px rgba(255,215,0,0.4);text-align:center;}
.shop-content h2{margin-top:0;}
.coin-pack{background:linear-gradient(90deg,#22d3ee,#818cf8);margin:8px;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600;color:black;}
.close-shop{margin-top:10px;background:#ef4444;color:white;}
.leaderboard{margin-top:15px;text-align:left;padding:10px;background:rgba(0,0,0,0.2);border-radius:10px;min-height:100px;}
footer{margin-top:35px;padding:15px;font-size:13px;color:#64748b;}
</style>
</head>
<body>

<header class="logo">PrimeMines Mega v2</header>

<div class="container">
<div class="panel">
    <div class="balance">
        Balance: $<span id="balance">1000.00</span>
        <button class="shop-btn" onclick="openShop()">Shop</button>
    </div>

    <div class="controls">
        Bet: <input type="number" id="bet" value="10" min="1">
        Mines:
        <select id="mineCount">
            <option>3</option><option>5</option><option>7</option><option>10</option>
        </select><br>
        <button class="primary" onclick="startGame()">Start</button>
        <button class="secondary" onclick="cashOut()">Cash Out</button>
    </div>

    <div class="stats">
        Multiplier: <span id="multiplier">1.00x</span> |
        Potential Win: $<span id="winnings">0</span> |
        Streak: 🔥<span id="streak">0</span>
    </div>

    <div class="grid" id="grid"></div>

    <div class="leaderboard" id="leaderboard">
        <strong>Leaderboard (Fake)</strong><br>
        Loading...
    </div>
</div>
</div>

<canvas id="confetti"></canvas>

<div class="shop" id="shop">
  <div class="shop-content">
    <h2>Coin Shop (Demo)</h2>
    <div class="coin-pack" onclick="addCoins(500)">+ $500</div>
    <div class="coin-pack" onclick="addCoins(2000)">+ $2,000</div>
    <div class="coin-pack" onclick="addCoins(10000)">+ $10,000</div>
    <button class="close-shop" onclick="closeShop()">Close</button>
  </div>
</div>

<footer>Demo version • Fake currency • No real purchases</footer>

<script>
// ----- SAVE & LOAD -----
let saveData = JSON.parse(localStorage.getItem("PrimeMinesData")) || {balance:1000,streak:0};
let balance = saveData.balance;
let streak = saveData.streak;

// ----- GAME -----
let minePositions=[],revealedTiles=0,gameActive=false,betAmount=0,multiplier=1;

// ----- UPDATE UI -----
function updateBalanceDisplay(){document.getElementById("balance").textContent=balance.toFixed(2);}
function updateStreakDisplay(){document.getElementById("streak").textContent=streak;document.body.classList.toggle("hot",streak>=3);}
function updateStats(){document.getElementById("multiplier").textContent=multiplier.toFixed(2)+"x";document.getElementById("winnings").textContent=(betAmount*multiplier).toFixed(2);saveGame();}
function saveGame(){localStorage.setItem("PrimeMinesData",JSON.stringify({balance:balance,streak:streak}));}

// ----- SHOP -----
function openShop(){document.getElementById("shop").style.display="flex";}
function closeShop(){document.getElementById("shop").style.display="none";}
function addCoins(amount){balance+=amount;updateBalanceDisplay();saveGame();}

// ----- LEADERBOARD -----
let fakePlayers=["BlueDev","LuckyCat","GamerX","Nova","Star","Pixel","MegaPro"];
function updateLeaderboard(){
    const lb=document.getElementById("leaderboard");
    lb.innerHTML="<strong>Leaderboard (Fake)</strong><br>";
    fakePlayers.forEach(name=>{
        let money=1000+Math.floor(Math.random()*9000);
        animateMoney(lb,name,money);
    });
    // add player at bottom
    animateMoney(lb,"You",balance,true);
}
function animateMoney(container,name,target,player=false){
    let current=0;
    const line=document.createElement("div");
    container.appendChild(line);
    function step(){
        current+=(target-current)/10;
        line.textContent=`${name}: $${Math.floor(current)}`;
        if(Math.abs(current-target)>0.5) requestAnimationFrame(step);
        else line.textContent=`${name}: $${Math.floor(target)}`;
    }
    step();
}
updateLeaderboard();

// ----- GAME -----
function startGame(){
    betAmount=parseFloat(document.getElementById("bet").value);
    if(betAmount>balance)return alert("Not enough balance!");
    balance-=betAmount;updateBalanceDisplay();

    const grid=document.getElementById("grid");
    grid.innerHTML="";minePositions=[];revealedTiles=0;multiplier=1;gameActive=true;

    const mineCount=parseInt(document.getElementById("mineCount").value);
    while(minePositions.length<mineCount){let pos=Math.floor(Math.random()*25);if(!minePositions.includes(pos))minePositions.push(pos);}

    for(let i=0;i<25;i++){
        const tile=document.createElement("div");
        tile.classList.add("tile");tile.dataset.index=i;tile.onclick=()=>revealTile(tile);
        const rand=Math.random();
        if(rand<0.01)tile.dataset.rarity="diamond";
        else if(rand<0.05)tile.dataset.rarity="rainbow";
        else if(rand<0.15)tile.dataset.rarity="purple";
        else if(rand<0.30)tile.dataset.rarity="gold";
        grid.appendChild(tile);
    }
    updateStats();
}

// ----- TILE REVEAL -----
function revealTile(tile){
    if(!gameActive||tile.classList.contains("revealed"))return;
    const index=parseInt(tile.dataset.index);tile.classList.add("revealed");

    if(minePositions.includes(index)){
        tile.classList.add("mine");tile.textContent="💣";streak=0;updateStreakDisplay();gameOver(false);
    }else{
        revealedTiles++;multiplier=1+(revealedTiles*0.25);
        if(tile.dataset.rarity){
            switch(tile.dataset.rarity){
                case"gold":multiplier*=1.5;tile.classList.add("gold");tile.textContent="💛";balance+=betAmount*0.5;break;
                case"purple":multiplier*=2;tile.classList.add("purple");tile.textContent="💜";balance+=betAmount;break;
                case"rainbow":multiplier*=3;tile.classList.add("rainbow");tile.textContent="🌈";balance+=betAmount*2;break;
                case"diamond":multiplier*=5;tile.classList.add("diamond");tile.textContent="💎";balance+=betAmount*5;streak++;triggerConfetti();break;
            }
            updateBalanceDisplay();
        }else{tile.classList.add("safe");tile.textContent="💎";}
        updateStats();
    }
}

// ----- CASHOUT & GAMEOVER -----
function cashOut(){if(!gameActive||revealedTiles===0)return;gameOver(true);}
function gameOver(cashedOut){
    gameActive=false;
    document.querySelectorAll(".tile").forEach((tile,i)=>{if(minePositions.includes(i)){tile.classList.add("revealed","mine");tile.textContent="💣";}});
    if(cashedOut){let winnings=betAmount*multiplier;balance+=winnings;streak++;updateBalanceDisplay();updateStreakDisplay();updateLeaderboard();saveGame();setTimeout(()=>alert("Cashed out $"+winnings.toFixed(2)),300);}
    else{updateLeaderboard();saveGame();setTimeout(()=>alert("Boom! You hit a mine."),300);}
}

// ----- CONFETTI -----
const confettiCanvas=document.getElementById("confetti");
const ctx=confettiCanvas.getContext("2d");
confettiCanvas.width=window.innerWidth;confettiCanvas.height=window.innerHeight;
let confettis=[];
function triggerConfetti(){
    for(let i=0;i<150;i++){confettis.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-0.5)*5,vy:Math.random()*-10,size:Math.random()*6+2,color:`hsl(${Math.random()*360},100%,50%)`});}
    setTimeout(()=>{confettis=[];},2000);
}
function updateConfetti(){
    ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    confettis.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.vy+=0.2;ctx.fillStyle=c.color;ctx.fillRect(c.x,c.y,c.size,c.size);});
    requestAnimationFrame(updateConfetti);
}
updateConfetti();
</script>
</body>
</html>
