<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Market</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
:root {
    --bg: #020617;
    --card: #0f172a;
    --accent: #38bdf8;
    --warn: #facc15;
    --text: #e5e7eb;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

h1, h2 {
    text-align: center;
    color: var(--accent);
}

.controls, .ai-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

input, button {
    padding: 10px;
    border-radius: 6px;
    border: none;
}

input {
    flex: 1;
    background: var(--card);
    color: white;
}

button {
    background: var(--accent);
    font-weight: bold;
    cursor: pointer;
}

.watchlist .item {
    background: var(--card);
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
}

.timeframes {
    display: flex;
    gap: 6px;
    margin: 10px 0;
}

.timeframes button {
    background: var(--card);
    color: white;
}

.timeframes button.active {
    background: var(--accent);
    color: black;
}

canvas {
    border-radius: 10px;
}

#tv {
    height: 420px;
    margin-top: 15px;
}

/* ===== AI SECTION ===== */
.ai-section {
    margin-top: 40px;
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
}

.warning {
    background: rgba(250,204,21,0.1);
    border: 1px solid var(--warn);
    color: var(--warn);
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 10px;
}

.ai-status {
    font-size: 13px;
    color: #94a3b8;
    height: 18px;
    margin-bottom: 6px;
}

.ai-status.active::after {
    content: " ▓▒░";
    animation: dots 1.2s infinite;
}

@keyframes dots {
    0% { content: " ░"; }
    50% { content: " ▓▒"; }
    100% { content: " ▓▒░"; }
}

#aiCanvas {
    width: 100%;
    height: 360px;
    background: radial-gradient(circle at top, #020617, #000);
}

.footer {
    text-align: center;
    margin-top: 25px;
    font-size: 13px;
    color: #94a3b8;
}

@media (max-width: 600px) {
    #tv { height: 360px; }
}
</style>
</head>

<body>
<div class="container">
<h1>🌌 Nebula Market</h1>

<!-- Market Controls -->
<div class="controls">
    <input id="symbol" placeholder="AAPL, TSLA, BTC">
    <button onclick="add()">Add</button>
</div>

<div class="watchlist" id="watchlist"></div>

<div class="timeframes">
    <button onclick="loadHistory('1D')" class="active">1D</button>
    <button onclick="loadHistory('1W')">1W</button>
    <button onclick="loadHistory('1M')">1M</button>
</div>

<canvas id="chart" height="120"></canvas>
<div id="tv"></div>

<!-- AI SECTION -->
<div class="ai-section">
    <h2>🤖 AI Trajectory Projector</h2>

    <div class="warning">
        ⚠️ AI-generated projection. Results may be inaccurate or misleading.
        Visualization only.
    </div>

    <div class="ai-status" id="aiStatus">Idle</div>

    <div class="ai-controls">
        <button onclick="runAI()">Recalculate</button>
        <button onclick="clearAI()">Clear</button>
    </div>

    <canvas id="aiCanvas"></canvas>
</div>

<div class="footer">
    © <span id="year"></span> Nebula Market. All rights reserved.
</div>
</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* ===== MARKET ===== */
let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];
let selected = null;
let chart;

function add() {
    const s = symbol.value.toUpperCase();
    if (!s || watchlist.includes(s)) return;
    watchlist.push(s);
    localStorage.setItem("watchlist", JSON.stringify(watchlist));
    render();
}

const watchlistEl = document.getElementById("watchlist");
function render() {
    watchlistEl.innerHTML = "";
    watchlist.forEach(s => {
        const d = document.createElement("div");
        d.className = "item";
        d.textContent = s;
        d.onclick = () => selectSymbol(s);
        watchlistEl.appendChild(d);
    });
}
render();

function selectSymbol(s) {
    selected = s;
    loadTradingView(s);
    runAI(); // 🔗 SYNC TO AI
}

function loadHistory(tf) {
    document.querySelectorAll(".timeframes button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");

    const labels = Array.from({length: 20}, (_, i) => i);
    const prices = labels.map(() => Math.random() * 5 + 100);

    if (chart) chart.destroy();
    chart = new Chart(chartEl, {
        type: "line",
        data: { labels, datasets: [{ label: selected, data: prices, tension: 0.4 }] }
    });
}

function loadTradingView(symbol) {
    tv.innerHTML = "";
    new TradingView.widget({
        container_id: "tv",
        symbol: ["BTC","ETH","SOL","DOGE"].includes(symbol)
            ? `BINANCE:${symbol}USDT`
            : symbol,
        theme: "dark",
        autosize: true
    });
}

const chartEl = document.getElementById("chart");
const tv = document.getElementById("tv");

/* ===== AI TRAJECTORY ===== */
const aiCanvas = document.getElementById("aiCanvas");
const ctx = aiCanvas.getContext("2d");
const aiStatus = document.getElementById("aiStatus");

function resizeAI() {
    aiCanvas.width = aiCanvas.offsetWidth;
    aiCanvas.height = aiCanvas.offsetHeight;
}
window.addEventListener("resize", resizeAI);
resizeAI();

function clearAI() {
    ctx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
    aiStatus.textContent = "Idle";
    aiStatus.classList.remove("active");
}

async function runAI() {
    if (!selected) {
        aiStatus.textContent = "No asset selected";
        return;
    }

    aiStatus.textContent = "Scanning historical data…";
    aiStatus.classList.add("active");
    ctx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);

    try {
        const prices = await fetchPrices(selected);
        aiStatus.textContent = "Running trajectory model…";

        const model = regression(prices);
        drawTrajectory(model, prices);

        aiStatus.textContent =
            `Projected • Confidence: ${Math.round(model.confidence)}%`;

    } catch (e) {
        console.error(e);
        aiStatus.textContent = "Data scan failed";
    }

    aiStatus.classList.remove("active");
}

/* ===== REAL DATA SCAN ===== */
async function fetchPrices(symbol) {
    const isCrypto = ["BTC","ETH","SOL","DOGE"].includes(symbol);
    const url = isCrypto
        ? `https://www.alphavantage.co/query?function=DIGITAL_CURRENCY_DAILY&symbol=${symbol}&market=USD&apikey=3UF0NYK6IEGTIA3Z`
        : `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=3UF0NYK6IEGTIA3Z`;

    const res = await fetch(url);
    const data = await res.json();

    const series = data["Time Series (Daily)"] || data["Time Series (Digital Currency Daily)"];
    const values = Object.values(series).slice(0, 30).reverse();

    return values.map(v => parseFloat(v["4. close"] || v["4a. close (USD)"]));
}

/* ===== REGRESSION MODEL ===== */
function regression(data) {
    const n = data.length;
    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;

    data.forEach((y, x) => {
        sumX += x;
        sumY += y;
        sumXY += x * y;
        sumXX += x * x;
    });

    const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX ** 2);
    const intercept = (sumY - slope * sumX) / n;

    let error = 0;
    data.forEach((y, x) => {
        const yHat = slope * x + intercept;
        error += Math.abs(y - yHat);
    });

    const confidence = Math.max(5, 100 - (error / n));
    return { slope, intercept, confidence };
}

/* ===== DRAW TRAJECTORY ===== */
function drawTrajectory(model, prices) {
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#38bdf8";

    const scaleX = aiCanvas.width / 40;
    const min = Math.min(...prices);
    const max = Math.max(...prices);
    const scaleY = aiCanvas.height / (max - min);

    ctx.beginPath();
    for (let x = 0; x < 40; x++) {
        const yVal = model.slope * x + model.intercept;
        const y = aiCanvas.height - (yVal - min) * scaleY;
        const px = x * scaleX;
        if (x === 0) ctx.moveTo(px, y);
        else ctx.lineTo(px, y);
    }
    ctx.stroke();
}
</script>
</body>
</html>
