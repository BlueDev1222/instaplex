<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matrix Terminal</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
    }
    canvas {
        display: block;
    }
    #startBtn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 30px;
        font-size: 20px;
        background: black;
        color: #00ff66;
        border: 2px solid #00ff66;
        cursor: pointer;
        z-index: 10;
    }
    #startBtn:hover {
        background: #00ff66;
        color: black;
    }
</style>
</head>
<body>

<button id="startBtn">INITIATE BREACH</button>
<canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// BIG character set like the Matrix vibe
const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()*&^%+-/~{[|`]}";

// Turn string into array
const charArray = chars.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;

// One drop per column
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
    // Slight fade for trail effect
    ctx.fillStyle = "rgba(0, 0, 0, 0.06)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff66";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = charArray[Math.floor(Math.random() * charArray.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        // Reset randomly to keep flow uneven
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

let interval;

document.getElementById("startBtn").onclick = () => {
    document.getElementById("startBtn").style.display = "none";
    if (!interval) interval = setInterval(draw, 30);
};

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
